<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreaMonitor</title>
<style>
:root {
  --bg: #0a0a0a; --bg2: #111; --bg3: #1a1a1a; --bg4: #222;
  --border: #333; --text: #e5e5e5; --text2: #999; --text3: #666;
  --accent: #3b82f6; --accent2: #2563eb; --green: #22c55e; --red: #ef4444;
  --orange: #f59e0b; --purple: #a855f7; --yellow: #eab308; --cyan: #06b6d4;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }

/* Layout */
.app { display:flex; flex-direction:column; height:100vh; }
.header { display:flex; align-items:center; padding:0 20px; background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0; height:50px; gap:16px; }
.logo { font-size:18px; font-weight:700; white-space:nowrap; }
.logo span { color:var(--accent); }
.tabs { display:flex; gap:2px; margin-left:16px; }
.tab { padding:12px 18px; font-size:13px; font-weight:500; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent; transition:all .15s; user-select:none; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.header-right { margin-left:auto; display:flex; gap:8px; align-items:center; }

/* Stats bar */
.stats-bar { display:flex; gap:14px; padding:10px 20px; background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0; align-items:center; flex-wrap:wrap; }
.stat { display:flex; align-items:center; gap:5px; font-size:13px; }
.stat .n { font-weight:700; font-size:15px; }
.stat.t .n { color:var(--accent); }
.stat.o .n { color:var(--green); }
.stat.r .n { color:var(--red); }
.stat.d .n { color:var(--orange); }
.sep { width:1px; height:18px; background:var(--border); }
.disk-bar { height:4px; width:100px; background:var(--bg4); border-radius:2px; overflow:hidden; }
.disk-fill { height:100%; background:var(--orange); border-radius:2px; transition:width .5s; }

/* Buttons */
.btn { padding:6px 14px; border-radius:6px; border:none; cursor:pointer; font-size:12px; font-weight:500; transition:all .15s; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent2); }
.btn-danger { background:var(--red); color:#fff; }
.btn-danger:hover { background:#dc2626; }
.btn-success { background:var(--green); color:#fff; }
.btn-success:hover { background:#16a34a; }
.btn-ghost { background:transparent; color:var(--text2); border:1px solid var(--border); }
.btn-ghost:hover { color:var(--text); border-color:var(--text3); }
.btn-sm { padding:4px 10px; font-size:11px; }
.btn-xs { padding:2px 7px; font-size:11px; }

/* Page containers */
.page { flex:1; overflow:hidden; display:none; flex-direction:column; }
.page.active { display:flex; }

/* ── Models Page ── */
.toolbar { display:flex; align-items:center; gap:8px; padding:8px 20px; border-bottom:1px solid var(--border); background:var(--bg); flex-shrink:0; flex-wrap:wrap; }
.search { flex:1; min-width:140px; background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:7px 12px; color:var(--text); font-size:13px; outline:none; }
.search:focus { border-color:var(--accent); }
.filter-btn { padding:5px 12px; border-radius:6px; border:1px solid var(--border); background:var(--bg3); color:var(--text2); font-size:12px; cursor:pointer; transition:all .15s; user-select:none; }
.filter-btn:hover { border-color:var(--text3); color:var(--text); }
.filter-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
select.site-filter { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:5px 8px; color:var(--text); font-size:12px; cursor:pointer; outline:none; }

/* Model table */
.model-table-wrap { flex:1; overflow-y:auto; padding:0; }
.model-table-wrap::-webkit-scrollbar { width:6px; }
.model-table-wrap::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
table.models { width:100%; border-collapse:collapse; font-size:13px; }
table.models thead { position:sticky; top:0; z-index:2; background:var(--bg2); }
table.models th { padding:8px 12px; text-align:left; font-weight:600; font-size:12px; color:var(--text2); border-bottom:1px solid var(--border); white-space:nowrap; }
table.models td { padding:6px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
table.models tbody tr:hover { background:var(--bg3); }
table.models tr.rec { background:rgba(239,68,68,.06); }

.dot { display:inline-block; width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.dot.rec { background:var(--red); animation:pulse 2s infinite; }
.dot.on { background:var(--green); }
.dot.off { background:var(--text3); }
.dot.err { background:var(--orange); }
.dot.nr { background:var(--text3); opacity:.4; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }

.preview-thumb { width:32px; height:32px; border-radius:4px; object-fit:cover; background:var(--bg4); }
.u-link { color:var(--text); text-decoration:none; font-weight:600; }
.u-link:hover { color:var(--accent); }
.site-badge { display:inline-block; padding:1px 6px; border-radius:4px; font-size:11px; font-weight:600; background:var(--bg4); color:var(--text2); margin:1px; }
.group-badge { display:inline-block; padding:1px 6px; border-radius:4px; font-size:11px; font-weight:500; background:rgba(234,179,8,.15); color:var(--yellow); }
.rec-badge { color:var(--red); font-weight:600; animation:pulse 2s infinite; }
.mobile-badge { color:var(--orange); font-size:11px; }

/* Bottom bar */
.bottom-bar { display:flex; align-items:center; gap:8px; padding:8px 20px; border-top:1px solid var(--border); background:var(--bg2); flex-shrink:0; flex-wrap:wrap; }
.add-form { display:flex; gap:6px; align-items:center; flex:1; }
.add-form input, .add-form select { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:6px 10px; color:var(--text); font-size:13px; outline:none; }
.add-form input:focus, .add-form select:focus { border-color:var(--accent); }
.add-form input { min-width:120px; flex:1; max-width:200px; }

/* ── Groups Page ── */
.groups-page { padding:20px; overflow-y:auto; flex:1; }
.groups-page::-webkit-scrollbar { width:6px; }
.groups-page::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.group-card { background:var(--bg2); border:1px solid var(--border); border-radius:8px; margin-bottom:12px; overflow:hidden; }
.group-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); gap:12px; flex-wrap:wrap; }
.group-title { font-weight:700; font-size:15px; }
.group-status { font-size:12px; color:var(--text2); margin-left:8px; }
.group-status.running { color:var(--green); }
.group-status.recording { color:var(--red); }
.group-actions { display:flex; gap:6px; }
.group-members { padding:8px 16px; }
.member-row { display:flex; align-items:center; gap:10px; padding:6px 0; font-size:13px; }
.member-row .dot { flex-shrink:0; }
.member-primary { color:var(--yellow); font-size:14px; flex-shrink:0; width:14px; text-align:center; }
.member-spacer { width:14px; flex-shrink:0; }
.member-name { font-weight:500; }
.member-site { color:var(--text2); font-size:12px; }
.member-status { color:var(--text2); font-size:12px; margin-left:auto; }
.group-add-member { display:flex; gap:6px; padding:8px 16px; border-top:1px solid var(--border); align-items:center; }
.group-add-member input, .group-add-member select { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:5px 8px; color:var(--text); font-size:12px; outline:none; flex:1; }
.create-group-form { display:flex; gap:8px; margin-bottom:16px; align-items:center; }
.create-group-form input { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:8px 12px; color:var(--text); font-size:14px; outline:none; flex:1; max-width:300px; }

/* ── Logs Page ── */
.logs-toolbar { display:flex; align-items:center; gap:8px; padding:8px 20px; border-bottom:1px solid var(--border); background:var(--bg); flex-shrink:0; flex-wrap:wrap; }
.logs-body { flex:1; overflow-y:auto; font-family:'Cascadia Code','Fira Code',Consolas,monospace; font-size:11.5px; line-height:1.7; padding:8px 16px; background:var(--bg); }
.logs-body::-webkit-scrollbar { width:6px; }
.logs-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.ll { white-space:pre-wrap; word-break:break-all; color:var(--text2); }
.ll.w { color:var(--orange); }
.ll.e { color:var(--red); }

/* ── Login ── */
.login-overlay { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:100; }
.login-box { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:32px; width:340px; }
.login-box h2 { text-align:center; margin-bottom:20px; font-size:20px; }
.login-box input { width:100%; margin-bottom:12px; background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:10px 12px; color:var(--text); font-size:14px; outline:none; }
.login-box input:focus { border-color:var(--accent); }
.login-box .btn { width:100%; padding:10px; font-size:14px; }
.login-error { color:var(--red); font-size:12px; margin-bottom:8px; text-align:center; }

.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; color:var(--text3); }
.empty .icon { font-size:36px; margin-bottom:8px; }
.empty p { font-size:13px; }

.live-dot { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; animation:pulse 2s infinite; margin-right:4px; }

@media (max-width:768px) {
  .stats-bar { gap:8px; padding:8px 12px; }
  .toolbar { padding:8px 12px; }
  table.models th, table.models td { padding:6px 8px; font-size:12px; }
  .bottom-bar { padding:8px 12px; }
  .groups-page { padding:12px; }
  .tabs { margin-left:4px; }
  .tab { padding:10px 10px; font-size:12px; }
}
</style>
</head>
<body>

<!-- Login -->
<div id="loginOverlay" class="login-overlay" style="display:none">
  <div class="login-box">
    <h2>🎬 StreaMonitor</h2>
    <div id="loginError" class="login-error" style="display:none"></div>
    <input type="text" id="loginUser" placeholder="Username" autocomplete="username">
    <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password">
    <button class="btn btn-primary" onclick="doLogin()">Login</button>
  </div>
</div>

<!-- App -->
<div class="app" id="app" style="display:none">
  <div class="header">
    <div class="logo">🎬 <span>Strea</span>Monitor</div>
    <div class="tabs">
      <div class="tab active" data-tab="models" onclick="switchTab('models')">📡 Models</div>
      <div class="tab" data-tab="groups" onclick="switchTab('groups')">🔗 Groups</div>
      <div class="tab" data-tab="logs" onclick="switchTab('logs')">📋 Logs</div>
    </div>
    <div class="header-right">
      <span class="live-dot"></span><span style="font-size:11px;color:var(--text2)">Live</span>
      <button class="btn btn-ghost btn-sm" id="saveBtn" onclick="saveConfig()">💾 Save</button>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()" title="Logout">🚪</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat t"><span class="n" id="sT">0</span> Models</div><div class="sep"></div>
    <div class="stat o"><span class="n" id="sO">0</span> Online</div><div class="sep"></div>
    <div class="stat r"><span class="n" id="sR">0</span> Recording</div><div class="sep"></div>
    <div class="stat d"><span class="n" id="sD">-</span> Free</div>
    <div class="disk-bar"><div class="disk-fill" id="dBar" style="width:0%"></div></div>
    <div style="margin-left:auto;display:flex;gap:6px">
      <button class="btn btn-success btn-sm" onclick="startAll()">▶ Start All</button>
      <button class="btn btn-danger btn-sm" onclick="stopAll()">⏹ Stop All</button>
    </div>
  </div>

  <!-- ═══ Models Page ═══ -->
  <div class="page active" id="page-models">
    <div class="toolbar">
      <input type="text" class="search" id="searchBox" placeholder="Search models..." oninput="renderModels()">
      <button class="filter-btn active" data-f="all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" data-f="recording" onclick="setFilter('recording')">🔴 Rec</button>
      <button class="filter-btn" data-f="online" onclick="setFilter('online')">🟢 Online</button>
      <button class="filter-btn" data-f="offline" onclick="setFilter('offline')">⚫ Offline</button>
      <select class="site-filter" id="siteFilter" onchange="renderModels()">
        <option value="">All Sites</option>
      </select>
    </div>
    <div class="model-table-wrap">
      <table class="models">
        <thead>
          <tr>
            <th style="width:32px"></th>
            <th style="width:40px"></th>
            <th>Username</th>
            <th>Site</th>
            <th>Group</th>
            <th>Status</th>
            <th>Recording</th>
            <th>Size</th>
            <th style="width:120px">Actions</th>
          </tr>
        </thead>
        <tbody id="modelBody"></tbody>
      </table>
    </div>
    <div class="bottom-bar">
      <div class="add-form">
        <span style="font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap">➕ Add:</span>
        <input type="text" id="addUser" placeholder="Username" autocomplete="off">
        <select id="addSite"></select>
        <button class="btn btn-primary btn-sm" onclick="addModel()">Add</button>
      </div>
    </div>
  </div>

  <!-- ═══ Groups Page ═══ -->
  <div class="page" id="page-groups">
    <div class="groups-page">
      <div class="create-group-form">
        <input type="text" id="newGroupName" placeholder="New group name...">
        <button class="btn btn-primary" onclick="createGroup()">Create Group</button>
      </div>
      <div id="groupsList"></div>
    </div>
  </div>

  <!-- ═══ Logs Page ═══ -->
  <div class="page" id="page-logs">
    <div class="logs-toolbar">
      <button class="filter-btn active" data-lf="all" onclick="setLogFilter('all')">All</button>
      <button class="filter-btn" data-lf="info" onclick="setLogFilter('info')">Info</button>
      <button class="filter-btn" data-lf="warn" onclick="setLogFilter('warn')">⚠ Warn</button>
      <button class="filter-btn" data-lf="error" onclick="setLogFilter('error')">❌ Error</button>
      <input type="text" class="search" id="logSearch" placeholder="Filter logs..." style="max-width:250px" oninput="renderLogs()">
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        <label style="font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;cursor:pointer">
          <input type="checkbox" id="logAutoScroll" checked style="accent-color:var(--accent)"> Auto-scroll
        </label>
        <button class="btn btn-ghost btn-sm" onclick="clearLogs()">Clear</button>
      </div>
    </div>
    <div class="logs-body" id="logsBody"><div class="ll">Connecting...</div></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// StreaMonitor Web Dashboard — SPA
// ═══════════════════════════════════════════════════════════

// ─── State ───
var token = localStorage.getItem('sm_token') || '';
var models = [], sites = [], groups = [];
var currentFilter = 'all', logFilter = 'all';
var logLines = [], logCleared = false;
var API = '';

// ─── Auth ───
function apiHeaders() {
  var h = { 'Content-Type': 'application/json' };
  if (token) h['Authorization'] = 'Bearer ' + token;
  return h;
}

async function apiFetch(path, opts) {
  opts = opts || {};
  opts.headers = apiHeaders();
  var r = await fetch(API + path, opts);
  if (r.status === 401) { showLogin(); throw new Error('Unauthorized'); }
  return r;
}

async function doLogin() {
  var u = document.getElementById('loginUser').value;
  var p = document.getElementById('loginPass').value;
  try {
    var r = await fetch(API + '/api/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username:u,password:p})
    });
    var d = await r.json();
    if (d.token) { token=d.token; localStorage.setItem('sm_token',token); hideLogin(); init(); }
    else { document.getElementById('loginError').textContent=d.error||'Login failed'; document.getElementById('loginError').style.display=''; }
  } catch(e) {
    document.getElementById('loginError').textContent='Connection error';
    document.getElementById('loginError').style.display='';
  }
}

function doLogout() {
  apiFetch('/api/auth/logout',{method:'POST'}).catch(function(){});
  token=''; localStorage.removeItem('sm_token'); showLogin();
}

function showLogin() { document.getElementById('loginOverlay').style.display=''; document.getElementById('app').style.display='none'; }
function hideLogin() { document.getElementById('loginOverlay').style.display='none'; document.getElementById('app').style.display=''; }

// ─── Init ───
async function init() {
  try {
    var r = await apiFetch('/api/auth/check');
    if (!r.ok) { showLogin(); return; }
    hideLogin();
  } catch(e) { showLogin(); return; }
  loadSites();
  doPoll();
  doPollLogs();
}

async function loadSites() {
  try {
    var r = await apiFetch('/api/sites');
    sites = await r.json();
    var sel = document.getElementById('addSite');
    sel.innerHTML = '';
    for (var i = 0; i < sites.length; i++) {
      var s = sites[i];
      var o = document.createElement('option');
      o.value = s.slug; o.textContent = s.name + ' (' + s.slug + ')';
      sel.appendChild(o);
    }
    var sf = document.getElementById('siteFilter');
    sf.innerHTML = '<option value="">All Sites</option>';
    for (var i = 0; i < sites.length; i++) {
      var s = sites[i];
      var o = document.createElement('option');
      o.value = s.slug; o.textContent = s.slug;
      sf.appendChild(o);
    }
  } catch(e) {}
}

// ─── Tabs ───
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.toggle('active', t.dataset.tab===name); });
  document.querySelectorAll('.page').forEach(function(p) { p.classList.toggle('active', p.id==='page-'+name); });
}

// ─── Polling ───
async function doPoll() {
  try {
    var results = await Promise.all([apiFetch('/api/status'), apiFetch('/api/models'), apiFetch('/api/groups')]);
    var status = await results[0].json();
    models = await results[1].json();
    groups = await results[2].json();
    updateStats(status);
    renderModels();
    if (document.getElementById('page-groups').classList.contains('active')) renderGroups();
  } catch(e) {}
  setTimeout(doPoll, 1500);
}

async function doPollLogs() {
  try {
    var r = await apiFetch('/api/logs');
    var lines = await r.json();
    if (!logCleared) {
      logLines = lines;
    } else {
      for (var i = 0; i < lines.length; i++) {
        if (logLines.indexOf(lines[i]) < 0) logLines.push(lines[i]);
      }
      if (logLines.length > 1000) logLines = logLines.slice(-1000);
    }
    renderLogs();
  } catch(e) {}
  setTimeout(doPollLogs, 1500);
}

// ─── Stats ───
function updateStats(s) {
  document.getElementById('sT').textContent = s.totalModels;
  document.getElementById('sO').textContent = s.onlineModels;
  document.getElementById('sR').textContent = s.recordingModels;
  if (s.disk) {
    var gb = (s.disk.freeBytes / 1073741824).toFixed(1);
    document.getElementById('sD').textContent = gb + ' GB';
    var pct = s.disk.totalBytes > 0 ? (100*(1-s.disk.freeBytes/s.disk.totalBytes)).toFixed(1) : 0;
    document.getElementById('dBar').style.width = pct + '%';
  }
}

// ─── Helpers ───
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function fmtSize(b) {
  if (!b || b <= 0) return '\u2014';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
  return (b/1073741824).toFixed(2) + ' GB';
}

function fmtDur(sec) {
  if (!sec || sec <= 0) return '';
  var h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec % 60;
  if (h > 0) return h + 'h ' + m + 'm';
  if (m > 0) return m + 'm ' + s + 's';
  return s + 's';
}

function dotClass(m) {
  if (m.recording) return 'rec';
  var s = (m.status || '').toLowerCase();
  if (s === 'public' || s === 'online') return 'on';
  if (s === 'notrunning') return 'nr';
  if (m.consecutiveErrors > 0) return 'err';
  if (s === 'error' || s === 'ratelimit' || s === 'cloudflare') return 'err';
  return 'off';
}

function dotColor(dc) {
  if (dc === 'rec') return 'var(--red)';
  if (dc === 'on') return 'var(--green)';
  if (dc === 'err') return 'var(--orange)';
  return 'var(--text2)';
}

function statusText(m) {
  if (m.recording) return 'Recording';
  return m.status || 'Unknown';
}

// ─── Render Models ───
function renderModels() {
  var search = document.getElementById('searchBox').value.toLowerCase();
  var siteF = document.getElementById('siteFilter').value;
  var body = document.getElementById('modelBody');

  // Build cross-register group lookup from group data
  var botToGroup = {};
  for (var gi = 0; gi < groups.length; gi++) {
    var grp = groups[gi];
    if (grp.members) {
      for (var mi = 0; mi < grp.members.length; mi++) {
        var mem = grp.members[mi];
        botToGroup[mem.username + '\t' + mem.site] = grp.name;
      }
    }
  }

  // Group models by cross-register group or username
  var gm = {};
  for (var i = 0; i < models.length; i++) {
    var m = models[i];
    var gName = botToGroup[m.username + '\t' + m.site] || botToGroup[m.username + '\t' + m.siteSlug] || '';
    var key = gName ? '\x01' + gName : m.username.toLowerCase();
    if (!gm[key]) gm[key] = { name: gName || m.username, models: [], groupName: gName };
    gm[key].models.push(m);
  }

  var entries = [];
  for (var k in gm) entries.push(gm[k]);

  // Filters
  if (search) {
    entries = entries.filter(function(g) {
      var s = g.name.toLowerCase();
      if (s.indexOf(search) >= 0) return true;
      return g.models.some(function(m) {
        return m.username.toLowerCase().indexOf(search) >= 0 ||
               (m.site||'').toLowerCase().indexOf(search) >= 0 ||
               (m.siteSlug||'').toLowerCase().indexOf(search) >= 0;
      });
    });
  }
  if (siteF) entries = entries.filter(function(g) { return g.models.some(function(m) { return m.siteSlug === siteF; }); });
  if (currentFilter === 'recording') entries = entries.filter(function(g) { return g.models.some(function(m) { return m.recording; }); });
  else if (currentFilter === 'online') entries = entries.filter(function(g) { return g.models.some(function(m) { return !m.recording && (m.status==='Public'||m.status==='Online'); }); });
  else if (currentFilter === 'offline') entries = entries.filter(function(g) { return g.models.every(function(m) { return !m.recording && m.status!=='Public' && m.status!=='Online'; }); });

  // Sort: recording > online > name
  entries.sort(function(a, b) {
    var ar = a.models.some(function(m){return m.recording;}), br = b.models.some(function(m){return m.recording;});
    if (ar !== br) return ar ? -1 : 1;
    var ao = a.models.some(function(m){return m.status==='Public'||m.status==='Online';}),
        bo = b.models.some(function(m){return m.status==='Public'||m.status==='Online';});
    if (ao !== bo) return ao ? -1 : 1;
    return a.name.localeCompare(b.name);
  });

  if (entries.length === 0) {
    body.innerHTML = '<tr><td colspan="9"><div class="empty"><div class="icon">📡</div><p>No models found</p></div></td></tr>';
    return;
  }

  var html = '';
  for (var ei = 0; ei < entries.length; ei++) {
    var g = entries[ei];
    var isGroup = !!g.groupName;
    var anyRec = g.models.some(function(m){return m.recording;});
    var anyOn = g.models.some(function(m){return m.status==='Public'||m.status==='Online';});
    var bestModel = g.models.find(function(m){return m.recording;}) || g.models.find(function(m){return m.status==='Public'||m.status==='Online';}) || g.models[0];
    var totalSize = g.models.reduce(function(s,m) { return s + (m.totalBytes||0) + ((m.recording_stats&&m.recording_stats.bytesWritten)||0); }, 0);
    var speed = anyRec ? g.models.reduce(function(s,m) { return Math.max(s, (m.recording_stats&&m.recording_stats.currentSpeed)||0); }, 0) : 0;
    var anyMobile = g.models.some(function(m){return m.mobile;});

    // Status dot class
    var dc = 'off';
    if (anyRec) dc = 'rec';
    else if (anyOn) dc = 'on';
    else if (g.models.some(function(m){return m.consecutiveErrors>0;})) dc = 'err';
    else if (g.models.every(function(m){return !m.running;})) dc = 'nr';

    // For cross-register groups, also check the group state
    if (isGroup) {
      var groupData = groups.find(function(gg){return gg.name===g.groupName;});
      if (groupData && groupData.state) {
        var gs = groupData.state;
        if (gs.running && gs.recording) dc = 'rec';
        else if (gs.running) {
          // Check best pairing status
          if (gs.pairings) {
            for (var pi=0; pi<gs.pairings.length; pi++) {
              var ps = gs.pairings[pi].status;
              if (ps==='Public'||ps==='Online') { dc='on'; break; }
            }
          }
          if (dc==='off'||dc==='nr') dc = 'on'; // running means at least checking
        }
      }
    }

    // Sites column
    var sitesHtml = '';
    if (isGroup) {
      sitesHtml = g.models.map(function(m) { return '<span class="site-badge">' + esc(m.username) + ' [' + esc(m.siteSlug) + ']</span>'; }).join(' ');
    } else {
      sitesHtml = g.models.map(function(m) { return '<span class="site-badge">' + esc(m.siteSlug) + '</span>'; }).join(' ');
    }

    // Status text
    var stText = bestModel ? statusText(bestModel) : 'Unknown';
    if (isGroup && groupData && groupData.state && groupData.state.running) {
      var gs = groupData.state;
      if (gs.recording) stText = 'Recording';
      else if (gs.activeStatus && gs.activeStatus !== 'NotRunning') stText = gs.activeStatus;
      else stText = 'Checking...';
    }
    if (bestModel && bestModel.uptimeSeconds > 0 && bestModel.running) stText += ' \u00b7 ' + fmtDur(bestModel.uptimeSeconds);

    // Recording column
    var recHtml = '<span style="color:var(--text3)">\u2014</span>';
    if (anyRec || (isGroup && groupData && groupData.state && groupData.state.recording)) {
      var recModel = g.models.find(function(m){return m.recording;});
      var sessSize = recModel && recModel.recording_stats ? fmtSize(recModel.recording_stats.bytesWritten) : '';
      recHtml = '<span class="rec-badge">\u25CF REC</span>';
      if (sessSize) recHtml += ' <span style="font-size:11px;color:var(--text2)">' + sessSize + '</span>';
      if (speed > 0) recHtml += ' <span style="font-size:11px;color:var(--text2)">' + speed.toFixed(1) + 'x</span>';
    }

    // Group column
    var groupHtml = '<span style="color:var(--text3)">\u2014</span>';
    if (g.groupName) groupHtml = '<span class="group-badge">' + esc(g.groupName) + '</span>';

    // Actions
    var primary = bestModel;
    var actHtml = '';
    if (isGroup) {
      var groupRunning = groupData && groupData.state && groupData.state.running;
      if (groupRunning) {
        actHtml += '<button class="btn btn-danger btn-xs" onclick="apiStopGroup(\'' + escA(g.groupName) + '\')">⏹ Stop</button>';
      } else {
        actHtml += '<button class="btn btn-success btn-xs" onclick="apiStartGroup(\'' + escA(g.groupName) + '\')">▶ Start</button>';
      }
    } else {
      for (var bi = 0; bi < g.models.length; bi++) {
        var mm = g.models[bi];
        if (mm.running) {
          actHtml += '<button class="btn btn-danger btn-xs" onclick="stopModel(\'' + escA(mm.username) + '\',\'' + escA(mm.siteSlug) + '\')" title="Stop ' + esc(mm.siteSlug) + '">⏹</button> ';
        } else {
          actHtml += '<button class="btn btn-success btn-xs" onclick="startModel(\'' + escA(mm.username) + '\',\'' + escA(mm.siteSlug) + '\')" title="Start ' + esc(mm.siteSlug) + '">▶</button> ';
        }
      }
      actHtml += '<button class="btn btn-ghost btn-xs" onclick="restartModel(\'' + escA(primary.username) + '\',\'' + escA(primary.siteSlug) + '\')" title="Restart">🔄</button> ';
      actHtml += '<button class="btn btn-ghost btn-xs" style="color:var(--red)" onclick="removeModel(\'' + escA(primary.username) + '\',\'' + escA(primary.siteSlug) + '\')" title="Remove">✕</button>';
    }

    // Preview
    var previewUrl = '/api/preview/' + encodeURIComponent(primary.username) + '/' + encodeURIComponent(primary.siteSlug);

    html += '<tr class="' + (anyRec ? 'rec' : '') + '">';
    html += '<td><div class="dot ' + dc + '"></div></td>';
    html += '<td><img class="preview-thumb" src="' + previewUrl + '" onerror="this.style.display=\'none\'" loading="lazy"></td>';
    html += '<td><a class="u-link" href="' + esc(primary.websiteUrl || '#') + '" target="_blank">' + esc(isGroup ? g.groupName : primary.username) + '</a>';
    if (anyMobile) html += ' <span class="mobile-badge">(M)</span>';
    html += '</td>';
    html += '<td>' + sitesHtml + '</td>';
    html += '<td>' + groupHtml + '</td>';
    html += '<td style="color:' + dotColor(dc) + '">' + esc(stText) + '</td>';
    html += '<td>' + recHtml + '</td>';
    html += '<td>' + fmtSize(totalSize) + '</td>';
    html += '<td style="white-space:nowrap">' + actHtml + '</td>';
    html += '</tr>';
  }
  body.innerHTML = html;
}

// ─── Render Groups ───
function renderGroups() {
  var c = document.getElementById('groupsList');
  if (!groups || groups.length === 0) {
    c.innerHTML = '<div class="empty"><div class="icon">🔗</div><p>No cross-register groups defined. Create one above.</p></div>';
    return;
  }

  var siteOpts = sites.map(function(s) { return '<option value="'+esc(s.name)+'">'+esc(s.name)+' ('+esc(s.slug)+')</option>'; }).join('');

  var html = '';
  for (var gi = 0; gi < groups.length; gi++) {
    var g = groups[gi];
    var st = g.state || {};

    var statusLabel = 'Stopped', statusCls = '';
    if (st.running && st.recording) {
      statusLabel = '\u25CF Recording: ' + (st.activeUsername||'') + ' on ' + (st.activeSite||'');
      statusCls = 'recording';
    } else if (st.running && st.activePairingIdx >= 0) {
      statusLabel = 'Checking: ' + (st.activeUsername||'') + ' on ' + (st.activeSite||'');
      statusCls = 'running';
    } else if (st.running) {
      statusLabel = 'All Offline \u2014 Sleeping';
      statusCls = 'running';
    }

    html += '<div class="group-card">';
    html += '<div class="group-header">';
    html += '<div><span class="group-title">' + esc(g.name) + '</span> <span class="group-status ' + statusCls + '">' + esc(statusLabel) + '</span></div>';
    html += '<div class="group-actions">';
    if (st.running) {
      html += '<button class="btn btn-danger btn-sm" onclick="apiStopGroup(\'' + escA(g.name) + '\')">⏹ Stop</button>';
    } else {
      html += '<button class="btn btn-success btn-sm" onclick="apiStartGroup(\'' + escA(g.name) + '\')">▶ Start</button>';
    }
    html += ' <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deleteGroup(\'' + escA(g.name) + '\')">🗑 Delete</button>';
    html += '</div></div>';

    html += '<div class="group-members">';
    if (g.members && g.members.length > 0) {
      for (var mi = 0; mi < g.members.length; mi++) {
        var m = g.members[mi];
        var pStatus = '\u2014', pColor = 'var(--text3)', pDot = 'off';
        if (st.pairings && st.pairings[mi]) {
          var ps = st.pairings[mi];
          pStatus = ps.status || '\u2014';
          if (pStatus === 'Public' || pStatus === 'Online') { pColor = 'var(--green)'; pDot = 'on'; }
          else if (pStatus === 'Offline') { pColor = 'var(--text3)'; pDot = 'off'; }
          else if (pStatus === 'Error' || pStatus === 'RateLimit') { pColor = 'var(--orange)'; pDot = 'err'; }
          if (st.recording && st.activePairingIdx === mi) { pDot = 'rec'; pStatus = 'Recording'; pColor = 'var(--red)'; }
          if (ps.mobile) { pColor = 'var(--orange)'; pStatus += ' (M)'; }
        }
        var isActive = st.running && st.activePairingIdx === mi;

        html += '<div class="member-row">';
        if (mi === 0) html += '<span class="member-primary" title="Primary">\u2605</span>';
        else html += '<span class="member-spacer"></span>';
        html += '<div class="dot ' + pDot + '"></div>';
        html += '<span class="member-name">' + esc(m.username) + '</span>';
        html += '<span class="member-site">[' + esc(m.site) + ']</span>';
        if (isActive) html += '<span style="color:var(--green);font-size:11px;margin-left:4px">\u25C4 active</span>';
        html += '<span class="member-status" style="color:' + pColor + '">' + esc(pStatus) + '</span>';
        html += ' <button class="btn btn-ghost btn-xs" style="color:var(--red)" onclick="removeMember(\'' + escA(g.name) + '\',\'' + escA(m.site) + '\',\'' + escA(m.username) + '\')">\u2715</button>';
        html += '</div>';
      }
    } else {
      html += '<div style="color:var(--text3);font-size:12px;padding:8px 0">No members yet</div>';
    }
    html += '</div>';

    // Add member form
    var safeId = g.name.replace(/[^a-zA-Z0-9]/g, '_');
    html += '<div class="group-add-member">';
    html += '<input type="text" placeholder="Username" id="gmu_' + safeId + '">';
    html += '<select id="gms_' + safeId + '">' + siteOpts + '</select>';
    html += '<button class="btn btn-primary btn-xs" onclick="addMember(\'' + escA(g.name) + '\',\'' + safeId + '\')">+ Add</button>';
    html += '</div>';
    html += '</div>';
  }
  c.innerHTML = html;
}

// ─── Render Logs ───
function renderLogs() {
  var el = document.getElementById('logsBody');
  var search = (document.getElementById('logSearch').value || '').toLowerCase();
  var atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 30;

  var filtered = logLines;
  if (logFilter !== 'all') {
    filtered = filtered.filter(function(l) {
      var lo = l.toLowerCase();
      if (logFilter === 'warn') return lo.indexOf('[warning]') >= 0 || lo.indexOf('[warn]') >= 0;
      if (logFilter === 'error') return lo.indexOf('[error]') >= 0 || lo.indexOf('[critical]') >= 0;
      if (logFilter === 'info') return lo.indexOf('[info]') >= 0;
      return true;
    });
  }
  if (search) filtered = filtered.filter(function(l) { return l.toLowerCase().indexOf(search) >= 0; });

  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var line = filtered[i];
    var cls = '';
    var lo = line.toLowerCase();
    if (lo.indexOf('[warning]') >= 0 || lo.indexOf('[warn]') >= 0) cls = 'w';
    else if (lo.indexOf('[error]') >= 0 || lo.indexOf('[critical]') >= 0) cls = 'e';
    html += '<div class="ll ' + cls + '">' + esc(line) + '</div>';
  }
  el.innerHTML = html || '<div class="ll">No logs</div>';

  if ((atBottom || document.getElementById('logAutoScroll').checked) && document.getElementById('page-logs').classList.contains('active')) {
    el.scrollTop = el.scrollHeight;
  }
}

function clearLogs() { logLines = []; logCleared = true; renderLogs(); }

// ─── Filters ───
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.toolbar .filter-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.f === f); });
  renderModels();
}
function setLogFilter(f) {
  logFilter = f;
  document.querySelectorAll('.logs-toolbar .filter-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.lf === f); });
  renderLogs();
}

// ─── Model Actions ───
async function addModel() {
  var u = document.getElementById('addUser').value.trim();
  var s = document.getElementById('addSite').value;
  if (!u) { document.getElementById('addUser').focus(); return; }
  try {
    var r = await apiFetch('/api/models', { method:'POST', body:JSON.stringify({username:u,site:s,autoStart:true}) });
    var d = await r.json();
    if (d.success) { document.getElementById('addUser').value = ''; }
    else { alert(d.error || 'Failed to add model'); }
  } catch(e) { alert('Failed to add model'); }
}

async function removeModel(u, s) {
  if (!confirm('Remove ' + u + ' [' + s + ']?')) return;
  try { await apiFetch('/api/models/' + encodeURIComponent(u) + '/' + encodeURIComponent(s), {method:'DELETE'}); } catch(e) {}
}

async function startModel(u, s) {
  try { await apiFetch('/api/models/' + encodeURIComponent(u) + '/' + encodeURIComponent(s) + '/start', {method:'POST'}); } catch(e) {}
}

async function stopModel(u, s) {
  try { await apiFetch('/api/models/' + encodeURIComponent(u) + '/' + encodeURIComponent(s) + '/stop', {method:'POST'}); } catch(e) {}
}

async function restartModel(u, s) {
  try { await apiFetch('/api/models/' + encodeURIComponent(u) + '/' + encodeURIComponent(s) + '/restart', {method:'POST'}); } catch(e) {}
}

async function startAll() { try { await apiFetch('/api/start-all', {method:'POST'}); } catch(e) {} }
async function stopAll() { try { await apiFetch('/api/stop-all', {method:'POST'}); } catch(e) {} }

async function saveConfig() {
  try {
    var r = await apiFetch('/api/save', {method:'POST'});
    var d = await r.json();
    if (d.success) {
      var btn = document.getElementById('saveBtn');
      btn.textContent = '\u2705 Saved';
      setTimeout(function() { btn.textContent = '\uD83D\uDCBE Save'; }, 1500);
    }
  } catch(e) {}
}

// ─── Group Actions ───
async function createGroup() {
  var name = document.getElementById('newGroupName').value.trim();
  if (!name) return;
  try {
    await apiFetch('/api/groups', { method:'POST', body:JSON.stringify({name:name,members:[]}) });
    document.getElementById('newGroupName').value = '';
    // Refresh
    var r = await apiFetch('/api/groups');
    groups = await r.json();
    renderGroups();
  } catch(e) {}
}

async function deleteGroup(name) {
  if (!confirm('Delete group "' + name + '"?')) return;
  try { await apiFetch('/api/groups/' + encodeURIComponent(name), {method:'DELETE'}); } catch(e) {}
  try { var r = await apiFetch('/api/groups'); groups = await r.json(); renderGroups(); } catch(e) {}
}

async function apiStartGroup(name) {
  try { await apiFetch('/api/groups/' + encodeURIComponent(name) + '/start', {method:'POST'}); } catch(e) {}
  try { var r = await apiFetch('/api/groups'); groups = await r.json(); renderGroups(); } catch(e) {}
}

async function apiStopGroup(name) {
  try { await apiFetch('/api/groups/' + encodeURIComponent(name) + '/stop', {method:'POST'}); } catch(e) {}
  try { var r = await apiFetch('/api/groups'); groups = await r.json(); renderGroups(); } catch(e) {}
}

async function addMember(gName, safeId) {
  var uEl = document.getElementById('gmu_' + safeId);
  var sEl = document.getElementById('gms_' + safeId);
  if (!uEl || !sEl) return;
  var username = uEl.value.trim(), site = sEl.value;
  if (!username) { uEl.focus(); return; }
  try {
    await apiFetch('/api/groups/' + encodeURIComponent(gName) + '/members', { method:'POST', body:JSON.stringify({site:site,username:username}) });
    uEl.value = '';
    var r = await apiFetch('/api/groups'); groups = await r.json(); renderGroups();
  } catch(e) {}
}

async function removeMember(gName, site, user) {
  try {
    await apiFetch('/api/groups/' + encodeURIComponent(gName) + '/members', { method:'DELETE', body:JSON.stringify({site:site,username:user}) });
    var r = await apiFetch('/api/groups'); groups = await r.json(); renderGroups();
  } catch(e) {}
}

// ─── Keyboard ───
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.activeElement && document.activeElement.id === 'addUser') addModel();
  if (e.key === 'Enter' && document.activeElement && document.activeElement.id === 'loginPass') doLogin();
  if (e.key === 'Enter' && document.activeElement && document.activeElement.id === 'newGroupName') createGroup();
});

// ─── Start ───
init();
</script>
