name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

permissions:
  contents: write
  packages: write
  actions: read

jobs:
  # ═══════════════════════════════════════════
  # Windows — vcpkg + MSVC (static, standalone)
  # ═══════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static-md

    steps:
      - uses: actions/checkout@v4

      # Enable GitHub Actions cache for vcpkg binary caching
      - name: Export GitHub Actions cache environment
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'e0edebd1dc2d03cf7d02349df91de74ef4d0c00e'  # 2026.02.27

      # Explicit cache for vcpkg installed packages (FFmpeg MSYS2 builds bypass x-gha)
      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/build/vcpkg_installed
          key: vcpkg-win-x64-static-md-${{ hashFiles('vcpkg.json') }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            vcpkg-win-x64-static-md-${{ hashFiles('vcpkg.json') }}-
            vcpkg-win-x64-static-md-

      - name: Configure
        run: |
          cmake -S . -B build `
            -DSM_STATIC_LINK=ON `
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static-md `
            -DVCPKG_HOST_TRIPLET=x64-windows-static-md `
            "-DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded`$<`$<CONFIG:Debug>:Debug>DLL"

      - name: Build
        run: cmake --build build --config Release --parallel $env:NUMBER_OF_PROCESSORS

      - name: Package
        run: python build.py --package-only --no-bump --no-deploy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreaMonitor-Windows-x64
          path: dist/

      - name: Upload Windows release archive
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: StreaMonitor-Windows-x64-release
          path: 'StreaMonitor-Windows*.zip'

  # ═══════════════════════════════════════════
  # Linux — system libraries + GCC
  # ═══════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            libcurl4-openssl-dev libssl-dev \
            nlohmann-json3-dev libspdlog-dev libfmt-dev \
            libavcodec-dev libavformat-dev libavfilter-dev \
            libswresample-dev libswscale-dev \
            libglfw3-dev libgl1-mesa-dev \
            libx264-dev libx265-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libxkbcommon-dev libwayland-dev \
            libnghttp2-dev

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSM_USE_SYSTEM_LIBS=ON \
            -DSM_USE_SYSTEM_FFMPEG=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Package
        run: python3 build.py --package-only --system-libs --no-bump --no-deploy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreaMonitor-Linux-x64
          path: dist/

      - name: Upload Linux release archive
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: StreaMonitor-Linux-x64-release
          path: 'StreaMonitor-Linux*.tar.gz'

  # ═══════════════════════════════════════════
  # Create GitHub Release — every push to main, tag, or manual trigger
  # ═══════════════════════════════════════════
  release:
    if: github.event_name != 'pull_request'
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from CMakeLists.txt
        id: version
        run: |
          VERSION=$(grep -oP 'project\(StreaMonitor\s+VERSION\s+\K[0-9.]+' CMakeLists.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: StreaMonitor-Windows-x64-release
          path: release/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: StreaMonitor-Linux-x64-release
          path: release/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "StreaMonitor v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: release/*
          draft: false
          prerelease: false
          make_latest: true
